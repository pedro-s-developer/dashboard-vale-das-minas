  relatorio:'<h2>Sumário Executivo</h2><p>O Vale das Minas investiu R$ 858 em anúncios entre 16 e 22 de julho, distribuídos entre a campanha de Topo (aquecimento de público) e a de Fundo MSG (captação de leads via WhatsApp). A campanha de Fundo gerou <strong>64 novas conversas a R$ 7,90 por conversa</strong> — custo mais alto do que o esperado para loteamentos, indicando necessidade de revisão criativa. O Topo (R$ 352) rodou como aquecimento de audiência para os próximos 30 dias.</p><h2>Resultados por Frente</h2><h3>Apresentação da Marca — Topo</h3><p>R$ 352 investidos em campanha de vídeo (Topo de funil), aquecendo a audiência de Belém e região para as campanhas de fundo. O objetivo é construir audiência quente para remarketing nos próximos 30 dias.</p><p><strong>Por que isso importa:</strong> o Topo alimenta o remarketing das campanhas de fundo. Sem ele, os criativos de fundo dependem exclusivamente de público frio — o que tende a elevar o CPR.</p><h3>Captação de Leads por WhatsApp — Fundo MSG</h3><p>R$ 505 investidos geraram <strong>64 novas conversas</strong> via WhatsApp a R$ 7,90 por conversa — resultado abaixo do esperado para loteamentos (referência do segmento: Excelente ≤R$ 3,50 | Ótimo ≤R$ 5,00). O CPR de R$ 7,90 indica que o criativo atual não está convertendo na velocidade esperada.</p><p><strong>Por que isso importa:</strong> com 64 conversas em uma semana, o time de atendimento tem volume para trabalhar — mas o custo por lead está corroendo o orçamento mais rápido do que deveria. Reduzir o CPR para a faixa Ótima (≤R$ 5,00) com o mesmo investimento geraria ~101 conversas — 58% a mais.</p><h2>Winners do Período</h2><ul><li><strong>Sem winner ativo confirmado no período</strong> — aguardando snapshot de criativos atualizado para identificar o melhor anúncio da semana.</li><li><strong>Referência do snapshot de 2026-07-21:</strong> Winner de Fundo-MSG com CPR na faixa Ótima — usar como base para novas variantes criativas.</li></ul><h2>Oportunidades Identificadas</h2><ol><li><strong>Revisar criativo de Fundo MSG</strong> — CPR de R$ 7,90 está acima da faixa Ótima para loteamentos. Testar novo criativo com hook de urgência de lote ou hook de valorização histórica da região.</li><li><strong>Ativar público de remarketing do Topo</strong> — com a campanha de aquecimento rodando há uma semana, já há audiência quente para criar um adset de remarketing na campanha de fundo, potencialmente com CPR mais baixo.</li><li><strong>Testar hook financeiro como âncora</strong> — copy focado em "entrada de R$ X e parcelas de R$ Y" tende a ter CTR alto em segmentação de primeiro imóvel.</li><li><strong>Validar taxa de conversão com atendimento</strong> — 64 conversas/semana: quantas chegaram a proposta? Qual o perfil do lead? Essa informação orienta qual hook priorizar.</li></ol><h2>Conclusão</h2><p>A semana foi de volume moderado (64 conversas) com CPR acima do ideal (R$ 7,90). O Topo está construindo a base de audiência corretamente. A ação mais urgente é revisar o criativo de Fundo MSG para reduzir o custo por conversa antes de escalar a verba.</p>'
};

(function(){
  var SC={b:'#1877F2',t:'#0077A8',y:'#E08C00',p:'#7B2FBE',g:'#00934a'};

      +'<div class="fn-rate"><div class="fn-rv">'+rt+'</div><div class="fn-rl">'+rl+'</div></div>'
    +'</div>';
  }
  function p(a,b){return b>0?Math.round(parseInt(a)/parseInt(b)*100):0;}
  var fv=_D.funil_ven,fm=_D.funil_msg;

      +s('t','🖱️','Cliques','Tráfego gerado',fv.cliques,p(fv.cliques,fv.alcance)+'%','CTR')
      +s('y','🌐','Visitas ao Site','Qualificação',fv.visitas,p(fv.visitas,fv.cliques)+'%','de cliques')
      +s('p','🛒','Adições ao Carrinho','Intenção de compra',fv.carrinho,p(fv.carrinho,fv.visitas)+'%','de visitas')
      +s('y','📝','Checkout Iniciado','Comprometimento',fv.checkout,p(fv.checkout,fv.carrinho)+'%','do carrinho')
      +s('g','✅','Compras Finalizadas','Conversão final',fv.compras,p(fv.compras,fv.checkout)+'%','do checkout')
      +(fv.insight?'<div class="fn-ins">'+fv.insight+'</div>':'')
      +'</div>';
  }
  if(_tp!=='ven'){
    _fhtml+='<div class="fn"><div class="fn-hdr"><div class="fn-icon" style="background:#F3EAFF;color:#7B2FBE">💬</div>'
      +'<div><div class="fn-title">Funil — Mensagens (MSG)</div><div class="fn-sub">Do alcance à conversa</div></div></div>'
      +s('p','📣','Alcance','Pessoas impactadas',fm.alcance,'—','entrada')
      +s('t','🖱️','Cliques','Tráfego para mensagem',fm.cliques,p(fm.cliques,fm.alcance)+'%','CTR')
      +s('g','💬','Conversas Iniciadas','Engajamento',fm.conversas,p(fm.conversas,fm.cliques)+'%','de cliques')
      +s('y','🆕','Novos Contatos','Leads qualificados',fm.novos,p(fm.novos,fm.conversas)+'%','das conversas')
      +(fm.insight?'<div class="fn-ins">'+fm.insight+'</div>':'')

  }

})();
